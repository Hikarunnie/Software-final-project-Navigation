# Speed
base_speed: 0.08
curve_speed: 0.18

# Lane controller gains
# k_d  (lateral_gain)  — corrects sideways offset from lane centre
# k_phi (heading_gain) — corrects angle between robot heading and lane direction
lateral_gain: 1.0
heading_gain: 2.0

# Legacy PD gains — no longer used by the controller, kept for reference
p_gain: 1.0
d_gain: 2.0
max_steer: 0.30

# Curve detection
curve_threshold: 350
steering_threshold: 0.15
curve_boost: 1.3

# Pixel threshold to consider lane detected.
detection_threshold: 50