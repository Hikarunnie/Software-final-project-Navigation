# Speed
base_speed: 0.22
curve_speed: 0.18

# PD gains — p_gain drives turning, must be high enough to actually turn
p_gain: 0.35
d_gain: 0.15
max_steer: 0.30

# Curve detection
curve_threshold: 350
steering_threshold: 0.15
curve_boost: 1.3

# Pixel threshold to consider lane detected.
# Kept LOW (50) because edge+colour filtering produces fewer pixels than raw colour.
# Raise to 150 only if the robot steers on false positives in open areas.
detection_threshold: 50