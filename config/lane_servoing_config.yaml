# --- Tuned to stop the snaking/oscillation around lane centre ---
# Slower forward speed = the robot covers less ground before a steering
# correction takes effect, so it stops overshooting past the centre.
base_speed: 0.26
curve_feedforward: 0.12
curve_threshold: 350
# Higher D = more damping on the swing back toward centre.
d_gain: 0.70
detection_threshold: 40
max_steer: 0.2
min_cruise_speed: 0.23
min_wheel_speed: 0.08
# Lower P = gentler corrections, less overshoot.
p_gain: 0.5
smooth_alpha: 0.6
steer_smooth: 0.6
turn_speed_ratio: 0.0
# Disabled: apriltag_detector.py is not in this repo, and its Python 3.7
# syntax crashes the robot's Python 3.6. Lane following works without it.
apriltag_enabled: false
apriltag_interval: 3
apriltag_min_area: 50.0